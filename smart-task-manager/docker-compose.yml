services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smarttask
      POSTGRES_PASSWORD: smarttask
      POSTGRES_DB: smart_tasks
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarttask -d smart_tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://smarttask:smarttask@db:5432/smart_tasks
      SECRET_KEY: change-this-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
